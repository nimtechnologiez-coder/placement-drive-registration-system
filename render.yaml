services:
  - type: web
    name: placement-portal
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: placement-db
          property: connectionString
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
    disk:
      name: uploads-storage
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1

databases:
  - name: placement-db
    plan: free
