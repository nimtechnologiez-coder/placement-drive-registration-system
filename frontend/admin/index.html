<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – Placement Registry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --sidebar-width: 260px;
        }

        body {
            background: #f0f2f5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1e293b;
        }

        .sidebar {
            width: var(--sidebar-width);
            min-height: 100vh;
            background: #0f172a;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 2rem;
            width: calc(100% - var(--sidebar-width));
        }

        .nav-link {
            color: #94a3b8;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .nav-link i {
            font-size: 1.25rem;
            margin-right: 0.75rem;
        }

        .control-panel {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        .filter-group {
            position: relative;
        }

        .filter-group i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            pointer-events: none;
        }

        .form-select,
        .form-control {
            padding-left: 2.5rem !important;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            height: 48px;
            font-size: 0.95rem;
        }

        .form-select:focus,
        .form-control:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .stats-badge {
            background: var(--primary-gradient);
            color: white;
            padding: 1rem 2rem;
            border-radius: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .table-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .table thead th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 1.25rem 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .table td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .badge-dept {
            background: #e0e7ff;
            color: #4338ca;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-weight: 500;
        }

        .btn-premium {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            color: white;
        }

        .btn-reset {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .btn-reset:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 0;
                padding: 0;
                overflow: hidden;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="d-flex align-items-center mb-5 ps-2">
            <div class="bg-primary rounded-3 p-2 me-3 shadow-lg"
                style="background: var(--primary-gradient) !important;">
                <i class="bi bi-rocket-takeoff text-white fs-4"></i>
            </div>
            <h4 class="mb-0 text-white fw-bold">Admin Hub</h4>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link active" href="#"><i class="bi bi-grid-alt"></i> Dashboard</a>
            <a class="nav-link" href="#"><i class="bi bi-people"></i> Candidates</a>
            <a class="nav-link" href="#" id="exportBtn"><i class="bi bi-file-earmark-arrow-down"></i> Export</a>
            <hr class="border-secondary opacity-25">
            <a class="nav-link" href="/"><i class="bi bi-box-arrow-left"></i> View Site</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold mb-1">Registrations Management</h2>
                <p class="text-muted mb-0">Monitor and manage all candidate applications</p>
            </div>
            <div class="stats-badge shadow-sm">
                <span class="small opacity-75">LIVE CANDIDATES</span>
                <strong class="fs-4" id="totalCount">0</strong>
            </div>
        </div>

        <section class="control-panel shadow-sm">
            <div class="row g-4 align-items-end">
                <div class="col-lg-4">
                    <label class="form-label small fw-bold text-muted ps-1">SEARCH</label>
                    <div class="filter-group">
                        <i class="bi bi-search"></i>
                        <input type="text" id="searchInput" class="form-control" placeholder="Name, Email or ID..."
                            oninput="loadData()">
                    </div>
                </div>
                <div class="col-lg-2">
                    <label class="form-label small fw-bold text-muted ps-1">DEPARTMENT</label>
                    <div class="filter-group">
                        <i class="bi bi-buildings"></i>
                        <select id="filterDept" class="form-select" onchange="loadData()">
                            <option value="">All Departments</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Mechanical Engineering">Mechanical Engineering</option>
                            <option value="Civil Engineering">Civil Engineering</option>
                            <option value="Electronics and Communication">Electronics and Communication</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="col-lg-2">
                    <label class="form-label small fw-bold text-muted ps-1">BATCH (YOP)</label>
                    <div class="filter-group">
                        <i class="bi bi-calendar-event"></i>
                        <select id="filterYop" class="form-select" onchange="loadData()">
                            <option value="">Any Year</option>
                            <option value="2022">2022</option>
                            <option value="2023">2023</option>
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                        </select>
                    </div>
                </div>
                <div class="col-lg-2">
                    <label class="form-label small fw-bold text-muted ps-1">MIN CGPA</label>
                    <div class="filter-group">
                        <i class="bi bi-award"></i>
                        <input type="number" id="filterCgpa" class="form-control" placeholder="0.0" step="0.1"
                            oninput="loadData()">
                    </div>
                </div>
                <div class="col-lg-2">
                    <button class="btn btn-reset w-100 mb-2" onclick="resetFilters()">
                        <i class="bi bi-arrow-counterclockwise me-2"></i> Reset
                    </button>
                    <button class="btn btn-premium w-100" onclick="loadData()">
                        <i class="bi bi-funnel me-2"></i> Refine
                    </button>
                </div>
            </div>
        </section>

        <div class="card table-card border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Full Candidate Name</th>
                            <th>Department</th>
                            <th>Performance</th>
                            <th>Batch</th>
                            <th>Contact Info</th>
                            <th>Documents</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="registryTable">
                        <!-- Data will be loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/admin.js"></script>
</body>

</html>
